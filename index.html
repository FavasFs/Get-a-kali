<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}

.opt .badge{min-width:22px;height:22px;border-radius:50%;border:1px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.opt.selected{border-color:#5340c0;background:#EEEDFE}
.opt.selected .badge{background:#5340c0;color:#fff;border-color:#5340c0}
.opt.correct{border-color:#0f6e56;background:#E1F5EE}
.opt.correct .badge{background:#0f6e56;color:#fff;border-color:#0f6e56}
.opt.wrong{border-color:#a32d2d;background:#FCEBEB}
.opt.wrong .badge{background:#a32d2d;color:#fff;border-color:#a32d2d}
.opt:disabled{cursor:default}
.nav-row{display:flex;gap:8px;margin-top:1rem;align-items:center}
.btn{padding:8px 18px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:#5340c0;color:#fff;border-color:#5340c0}
.btn.primary:hover{background:#3c34a0}
.btn:disabled{opacity:0.4;cursor:default}
.q-num{font-size:13px;color:var(--color-text-secondary);margin-left:auto}
.answer-reveal{margin-top:10px;padding:10px 12px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-size:13px;color:var(--color-text-secondary);line-height:1.5;display:none}
.answer-reveal.show{display:block}
.answer-reveal strong{color:var(--color-text-primary)}

.result-hero{text-align:center;padding:2rem 1rem}

.mode-toggle{display:flex;gap:6px;margin-bottom:1rem}

const LABELS=['A','B','C','D'];
let answers=new Array(ALL_Q.length).fill(-1);
let cur=0;
let submitted=false;

function weeksFor(){
  let ws=[];
  ALL_Q.forEach(q=>{if(!ws.includes(q.w))ws.push(q.w);});
  return ws.sort((a,b)=>a-b);
}

function renderWeekTabs(){
  const el=document.getElementById('week-tabs');
  const weeks=weeksFor();
  el.innerHTML='<button class="wt active" onclick="jumpWeek(0)" id="wt-all">All</button>'+
    weeks.map(w=>`<button class="wt" onclick="jumpWeek(${w})" id="wt-${w}">W${w}</button>`).join('');
}

function jumpWeek(w){
  if(w===0){cur=0;}
  else{cur=ALL_Q.findIndex(q=>q.w===w);if(cur<0)cur=0;}
  renderQ();
  document.querySelectorAll('.wt').forEach(b=>b.classList.remove('active'));
  const tid=w===0?'wt-all':`wt-${w}`;
  const tb=document.getElementById(tid);
  if(tb)tb.classList.add('active');
}

function renderQ(){
  const q=ALL_Q[cur];
  const answered=answers[cur]!==-1;
  const container=document.getElementById('q-container');
  container.innerHTML=`
    <div class="q-card">
      <div class="q-meta">Week ${q.w} · Question ${cur+1} of ${ALL_Q.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.opts.map((o,i)=>`
          <button class="opt${answers[cur]===i?' selected':''}"
            id="opt-${i}" onclick="selectOpt(${i})" ${submitted&&answered?'disabled':''}>
            <span class="badge">${LABELS[i]}</span>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="answer-reveal ${submitted&&answered?'show':''}" id="reveal">
        ${submitted&&answered?revealHTML(cur):''}
      </div>
    </div>
    <div class="nav-row">
      <button class="btn" onclick="nav(-1)" ${cur===0?'disabled':''}>← Prev</button>
      <button class="btn" onclick="nav(1)" ${cur===ALL_Q.length-1?'disabled':''}>Next →</button>
      ${!submitted?`<button class="btn primary" onclick="submitAll()" style="margin-left:auto">Submit & See Results</button>`:''}
      <span class="q-num">${cur+1} / ${ALL_Q.length}</span>
    </div>`;
  updateStats();
  highlightWeekTab();
}

function revealHTML(i){
  const q=ALL_Q[i];
  const ua=answers[i];
  const correct=ua===q.ans;
  return `<strong>${correct?'Correct!':'Wrong.'}</strong> The correct answer is <strong>${LABELS[q.ans]}. ${q.opts[q.ans]}</strong>`;
}

function selectOpt(i){
  if(submitted)return;
  answers[cur]=i;
  renderQ();
}

function nav(d){
  cur=Math.max(0,Math.min(ALL_Q.length-1,cur+d));
  renderQ();
}

function updateStats(){
  const ans=answers.filter(a=>a!==-1).length;
  let correct=0,wrong=0;
  if(submitted){
    answers.forEach((a,i)=>{if(a!==-1){if(a===ALL_Q[i].ans)correct++;else wrong++;}});
  }
  document.getElementById('s-answered').textContent=ans;
  document.getElementById('s-correct').textContent=submitted?correct:'—';
  document.getElementById('s-wrong').textContent=submitted?wrong:'—';
  document.getElementById('s-left').textContent=ALL_Q.length-ans;
  const pct=Math.round(ans/ALL_Q.length*100);
  document.getElementById('prog').style.width=pct+'%';
}

function highlightWeekTab(){
  const w=ALL_Q[cur].w;
  document.querySelectorAll('.wt').forEach(b=>b.classList.remove('active'));
  const tb=document.getElementById(`wt-${w}`);
  if(tb)tb.classList.add('active');
}

function submitAll(){
  const unanswered=answers.filter(a=>a===-1).length;
  if(unanswered>0){
    if(!confirm(`You have ${unanswered} unanswered questions. Submit anyway?`))return;
  }
  submitted=true;
  showResults();
}

function showResults(){
  let correct=0;
  answers.forEach((a,i)=>{if(a===ALL_Q[i].ans)correct++;});
  const pct=Math.round(correct/ALL_Q.length*100);
  document.getElementById('quiz-view').style.display='none';
  document.getElementById('results').style.display='block';
  document.getElementById('final-score').textContent=correct;
  let msg='Keep studying — review the answers below!';
  if(pct>=90)msg='Excellent! You are well prepared for the exam.';
  else if(pct>=75)msg='Good performance! Go over the ones you missed.';
  else if(pct>=60)msg='Passing range — review the incorrect answers carefully.';
  document.getElementById('final-msg').textContent=msg+` (${pct}%)`;
}

function showReview(){
  const rl=document.getElementById('review-list');
  if(rl.style.display==='block'){rl.style.display='none';return;}
  rl.style.display='block';
  rl.innerHTML=ALL_Q.map((q,i)=>{
    const ua=answers[i];
    const correct=ua===q.ans;
    const label=correct?'rv-correct':'rv-wrong';
    return `<div class="review-item ${label}">
      <div class="rv-q">W${q.w} Q${i+1}: ${q.q}</div>
      ${!correct&&ua!==-1?`<div class="rv-your">Your answer: ${LABELS[ua]}. ${q.opts[ua]}</div>`:''}
      ${!correct?`<div class="rv-ans">Correct: ${LABELS[q.ans]}. ${q.opts[q.ans]}</div>`:''}
    </div>`;
  }).join('');
}

function restartQuiz(){
  answers=new Array(ALL_Q.length).fill(-1);
  cur=0;
  submitted=false;
  document.getElementById('results').style.display='none';
  document.getElementById('quiz-view').style.display='block';
  renderQ();
  updateStats();
}

renderWeekTabs();
renderQ();
</script>
